name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tbats-landing-page/package-lock.json
      - name: Install dependencies
        run: cd tbats-landing-page && npm ci --legacy-peer-deps
      - name: Type check
        run: cd tbats-landing-page && npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tbats-landing-page/package-lock.json
      - name: Install dependencies
        run: cd tbats-landing-page && npm ci --legacy-peer-deps
      - name: Lint
        run: cd tbats-landing-page && npm run lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tbats-landing-page/package-lock.json
      - name: Install dependencies
        run: cd tbats-landing-page && npm ci --legacy-peer-deps
      - name: Run tests
        run: cd tbats-landing-page && npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./tbats-landing-page/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tbats-landing-page/package-lock.json
      - name: Install dependencies
        run: cd tbats-landing-page && npm ci --legacy-peer-deps
      - name: Build
        run: cd tbats-landing-page && npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: tbats-landing-page/dist
          retention-days: 7

  test:e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tbats-landing-page/package-lock.json
      - name: Install dependencies
        run: cd tbats-landing-page && npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: cd tbats-landing-page && npx playwright install --with-deps chromium
      - name: Build for E2E
        run: cd tbats-landing-page && npm run build
      - name: Preview server
        run: cd tbats-landing-page && npm run preview -- --port 4173 &
        shell: bash
      - name: Run Playwright tests
        run: cd tbats-landing-page && npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tbats-landing-page/playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tbats-landing-page/package-lock.json
      - name: Install dependencies
        run: cd tbats-landing-page && npm ci --legacy-peer-deps
      - name: Build
        run: cd tbats-landing-page && npm run build
      - name: Preview server
        run: cd tbats-landing-page && npm run preview -- --port 4173 &
        shell: bash
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: 'http://localhost:4173'
          budgetPath: ./tbats-landing-page/lighthouse-budget.json
          uploadArtifacts: true

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, test:e2e, lighthouse]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to Netlify Preview
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './tbats-landing-page/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy from GitHub Actions'
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}