version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore
      prefix-development: chore
    groups:
      react:
        patterns:
          - react*
          - @types/react*
      testing:
        patterns:
          - vitest*
          - @testing-library/*
          - @playwright/*
          - playwright*
      storybook:
        patterns:
          - '@storybook/*'
          - storybook
      eslint:
        patterns:
          - eslint*
          - '@typescript-eslint/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - ci
